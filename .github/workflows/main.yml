name: Update Repo

on:
  schedule:
    - cron: '30 22 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-versions:
    runs-on: ubuntu-latest
    steps:
      - name: checkout repo content
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: setup python
        uses: actions/setup-python@v2
        with:
          python-version: 3.x

      - name: install dependencies
        run: |
          if [ -f ./requirements_versions.txt ]; then pip3 install -r ./requirements_versions.txt; fi

      - name: run script
        run: |
          python3 process_versions.py

      - name: push changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name 'HamletDuFromage'
          git config --global user.email '90281142+Homletbot@users.noreply.github.com'
          git add versions.json
          git add versions/*
          if [[ `git status --porcelain` ]]; then
            git commit -m "automatic: updated version files"
            git push
          else
            echo "Nothing to commit!"
          fi

  update-cheats:
    needs: update-versions
    runs-on: ubuntu-latest
    steps:
      - name: checkout repo content
        uses: actions/checkout@v4
        with:
          ref: 'main'
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: setup python
        uses: actions/setup-python@v2
        with:
          python-version: 3.x

      - name: install python dependencies
        run: |
          if [ -f ./requirements_cheats.txt ]; then pip3 install -r ./requirements_cheats.txt; fi

      - name: install dependencies
        run: sudo apt-get install unrar

      - name: run python script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 database_builder.py

      - name: push changes and release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name 'HomletBot'
          git config --global user.email '90281142+Homletbot@users.noreply.github.com'

          git add cheats/ cheats_gfx/ README.md
          [ -d cheats_gbatemp ] && git add cheats_gbatemp/ || echo "cheats_gbatemp not found"

          if git diff --cached --quiet; then
            echo "Nothing to commit"
          else
            stat=$(git diff --cached --name-only)
            git commit -m "automatic: updated cheat files"
            git push
          fi

          # El release se crea siempre que existan los zips
          version=$(cat VERSION)

          if gh release view "$version" >/dev/null 2>&1; then
            echo "Release $version ya existe → actualizando assets"
          else
            echo "Creando release $version"
            echo -e "Last updated: **$version**" > changelog.md
            gh release create "$version" -F changelog.md
          fi

          [ -f ./gbatemp/contents.zip ] && gh release upload "$version" ./gbatemp/contents.zip --clobber || echo "gbatemp/contents.zip not found"
          [ -f ./gbatemp/titles.zip ]   && gh release upload "$version" ./gbatemp/titles.zip   --clobber || echo "gbatemp/titles.zip not found"

          mv ./NX-60FPS-RES-GFX-Cheats-main/contents.zip ./NX-60FPS-RES-GFX-Cheats-main/contents_60fps-res-gfx.zip 2>/dev/null || true
          mv ./NX-60FPS-RES-GFX-Cheats-main/titles.zip   ./NX-60FPS-RES-GFX-Cheats-main/titles_60fps-res-gfx.zip   2>/dev/null || true

          [ -f ./NX-60FPS-RES-GFX-Cheats-main/contents_60fps-res-gfx.zip ] && gh release upload "$version" ./NX-60FPS-RES-GFX-Cheats-main/contents_60fps-res-gfx.zip --clobber || true
          [ -f ./NX-60FPS-RES-GFX-Cheats-main/titles_60fps-res-gfx.zip ]   && gh release upload "$version" ./NX-60FPS-RES-GFX-Cheats-main/titles_60fps-res-gfx.zip   --clobber || true

          mv ./complete/contents.zip ./complete/contents_complete.zip 2>/dev/null || true
          mv ./complete/titles.zip   ./complete/titles_complete.zip   2>/dev/null || true

          [ -f ./complete/contents_complete.zip ] && gh release upload "$version" ./complete/contents_complete.zip --clobber || true
          [ -f ./complete/titles_complete.zip ]   && gh release upload "$version" ./complete/titles_complete.zip   --clobber || true
