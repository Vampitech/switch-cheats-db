name: Update Repo

on:
  schedule:
    - cron: '30 22 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-versions:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          if [ -f ./requirements_versions.txt ]; then
            pip install -r ./requirements_versions.txt
          fi

      - name: Run script
        run: python process_versions.py

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git pull origin main --rebase

          git add .

          echo "==== STATUS ===="
          git status
          echo "================"

          if git diff --cached --quiet; then
            echo "No hay cambios"
          else
            git commit -m "automatic: updated version files"
            git push
          fi

  update-cheats:
    needs: update-versions
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install Python dependencies
        run: |
          if [ -f ./requirements_cheats.txt ]; then
            pip install -r ./requirements_cheats.txt
          fi

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y unrar

      - name: Run script
        run: python database_builder.py

      - name: Commit + Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git pull origin main --rebase

          git add .

          echo "==== STATUS ===="
          git status
          echo "================"

          if git diff --cached --quiet; then
            echo "No hay cambios → no hay release"
            exit 0
          fi

          stat=$(git diff --cached --name-only)

          git commit -m "automatic: updated cheat files"
          git push

          # Crear versión por fecha
          version=$(date +'%Y-%m-%d')

          # Crear changelog
          echo -e "Last updated: **$version**\n\nFiles changed:\n\`\`\`\n$(echo $stat | xargs python3 build_changelog.py)\n\`\`\`" > changelog.md

          # Crear o actualizar release
          if gh release view "$version" >/dev/null 2>&1; then
            echo "Release ya existe → se actualiza"
          else
            gh release create "$version" -F changelog.md
          fi

          # Subir archivos (si existen)
          [ -f ./gbatemp/contents.zip ] && gh release upload "$version" ./gbatemp/contents.zip --clobber || true
          [ -f ./gbatemp/titles.zip ] && gh release upload "$version" ./gbatemp/titles.zip --clobber || true

          mv ./NX-60FPS-RES-GFX-Cheats-main/contents.zip ./NX-60FPS-RES-GFX-Cheats-main/contents_60fps-res-gfx.zip 2>/dev/null || true
          mv ./NX-60FPS-RES-GFX-Cheats-main/titles.zip ./NX-60FPS-RES-GFX-Cheats-main/titles_60fps-res-gfx.zip 2>/dev/null || true

          [ -f ./NX-60FPS-RES-GFX-Cheats-main/contents_60fps-res-gfx.zip ] && gh release upload "$version" ./NX-60FPS-RES-GFX-Cheats-main/contents_60fps-res-gfx.zip --clobber || true
          [ -f ./NX-60FPS-RES-GFX-Cheats-main/titles_60fps-res-gfx.zip ] && gh release upload "$version" ./NX-60FPS-RES-GFX-Cheats-main/titles_60fps-res-gfx.zip --clobber || true

          mv ./complete/contents.zip ./complete/contents_complete.zip 2>/dev/null || true
          mv ./complete/titles.zip ./complete/titles_complete.zip 2>/dev/null || true

          [ -f ./complete/contents_complete.zip ] && gh release upload "$version" ./complete/contents_complete.zip --clobber || true
          [ -f ./complete/titles_complete.zip ] && gh release upload "$version" ./complete/titles_complete.zip --clobber || true
